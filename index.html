<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - Phong cách CellphoneS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <a href="#" class="back-btn">← Tiếp tục mua sắm</a>
            <h1>Giỏ hàng của bạn</h1>
        </header>

        <main class="cart-wrapper">
            <section class="cart-items" id="cart-list">
                </section>

            <aside class="cart-summary">
                <div class="summary-box">
                    <div class="summary-line">
                        <span>Tổng tiền tạm tính:</span>
                        <span id="subtotal">0đ</span>
                    </div>
                    <div class="summary-line total">
                        <span>Tổng tiền:</span>
                        <span id="final-total" class="red-text">0đ</span>
                    </div>
                    <button class="btn-order">TIẾN HÀNH ĐẶT HÀNG</button>
                    <button class="btn-add-more">CHỌN THÊM SẢN PHẨM KHÁC</button>
                </div>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
